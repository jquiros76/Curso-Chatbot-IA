<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Curso Chatbot IA</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* VARIABLES */
:root {
  --green: #00c853;
  --bg: #0a0f0a;
  --bg2: #111811;
  --text: #e8f0e8;
  --muted: #7a9a7a;
}

/* BASE */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HERO */
.hero {
  padding: 50px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Syne';
  font-size: 2.5rem;
}

.hero span {
  color: var(--green);
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 250px 1fr;
}

/* SIDEBAR */
.sidebar {
  background: var(--bg2);
  padding: 20px;
}

.sidebar button {
  display: block;
  width: 100%;
  padding: 10px;
  background: none;
  border: none;
  color: var(--muted);
  text-align: left;
  cursor: pointer;
}

.sidebar button.active {
  color: var(--green);
}

/* CONTENT */
.content {
  padding: 30px;
}

/* LESSON */
.lesson {
  display: none;
}

.lesson.active {
  display: block;
}

/* CARD */
.card {
  margin-top: 20px;
  padding: 20px;
  background: var(--bg2);
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="hero">
  <h1>Chatbot IA para <span>WhatsApp</span></h1>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="showLesson(1)">Introducción</button>
    <button onclick="showLesson(2)">Casos de uso</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div id="lesson1" class="lesson">
      <h2>¿Qué es un chatbot?</h2>
      <p>Es un sistema que responde automáticamente a usuarios.</p>

      <div class="card">
        💡 Trabaja 24/7 capturando leads.
      </div>
    </div>

    <div id="lesson2" class="lesson">
      <h2>Casos de uso</h2>
      <p>E-commerce, clínicas, educación, automatización de ventas.</p>
    </div>

  </div>

</div>

<script>

function showLesson(num) {
  const lessons = document.querySelectorAll('.lesson');
  const buttons = document.querySelectorAll('.sidebar button');

  lessons.forEach(l => l.classList.remove('active'));
  buttons.forEach(b => b.classList.remove('active'));

  document.getElementById('lesson' + num).classList.add('active');
  buttons[num - 1].classList.add('active');
}

// INIT
showLesson(1);

</script>

</body>
</html>
