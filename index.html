<div class="card" onclick="go('modulo2-chatbots-full.html')">

<div class="card" onclick="go('modulo3-chatbots-full.html')">

<div class="card" onclick="go('modulo4-chatbots-full.html')">

<div class="card" onclick="go('modulo5-chatbots-full.html')">

<div class="card" onclick="go('modulo6-chatbots-full.html')">

</div>

</div>

}
