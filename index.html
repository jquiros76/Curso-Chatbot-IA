<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso Chatbot IA</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--green:#00c853;
--bg:#0a0f0a;
--bg2:#111811;
--border:#1e2e1e;
--text:#e8f0e8;
--muted:#7a9a7a;
--accent:#b9ff66;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
}

.hero{
padding:60px 40px;
border-bottom:1px solid var(--border);
}

.hero h1{
font-family:'Syne';
font-size:2.5rem;
font-weight:800;
}

.hero span{color:var(--accent)}

.layout{
display:grid;
grid-template-columns:280px 1fr;
}

/* SIDEBAR */
.sidebar{
background:var(--bg2);
border-right:1px solid var(--border);
padding:20px;
height:100vh;
overflow:auto;
}

.module-title{
margin-top:15px;
margin-bottom:5px;
font-size:12px;
color:var(--muted);
}

.lesson-btn{
display:block;
width:100%;
padding:8px;
background:none;
border:none;
color:var(--muted);
text-align:left;
cursor:pointer;
}

.lesson-btn.active{color:var(--green)}

/* CONTENT */
.content{
padding:40px;
max-width:900px;
}

.section{margin-bottom:30px}

.card{
background:var(--bg2);
border:1px solid var(--border);
padding:15px;
border-radius:10px;
margin-top:10px;
}

/* PROGRESS */
.progress{
height:4px;
background:var(--border);
margin-bottom:20px;
}

.progress-fill{
height:100%;
background:var(--green);
width:0%;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
margin-top:40px;
}

.nav-btn{
padding:10px 20px;
border:1px solid var(--border);
background:var(--bg2);
color:var(--text);
cursor:pointer;
}

.nav-btn.primary{
background:var(--green);
color:#000;
}
</style>

</head>

<body>

<div class="hero">
<h1>Chatbot IA para <span>WhatsApp Business</span></h1>
</div>

<div class="layout">

<aside class="sidebar">
<div class="progress"><div class="progress-fill" id="progress"></div></div>
<div id="sidebar"></div>
</aside>

<main class="content" id="content"></main>

</div>

<script>

const MODULES = [
{
title:"Módulo 1 - Fundamentos",
lessons:[
{title:"¿Qué es un chatbot?",html:`<div class="section"><h2>¿Qué es un chatbot?</h2><p>Automatiza conversaciones y captura leads.</p><div class="card">💡 Trabaja 24/7.</div></div>`},
{title:"Casos de uso",html:`<div class="section"><h2>Casos de uso</h2><p>E-commerce, clínicas, educación.</p></div>`},
{title:"Stack tecnológico",html:`<div class="section"><h2>Stack tecnológico</h2><p>WhatsApp API + IA + automatización.</p></div>`},
{title:"Handoff humano",html:`<div class="section"><h2>Handoff humano</h2><p>Transferencia a agentes.</p></div>`}
]
},
{
title:"Módulo 2 - Configuración",
lessons:[
{title:"Registrar número",html:`<div class="section"><h2>Registrar número</h2><p>Conecta tu número a la API.</p></div>`},
{title:"Conectar Tidio",html:`<div class="section"><h2>Conectar Tidio</h2><p>Gestiona conversaciones.</p></div>`},
{title:"Integrar OpenAI",html:`<div class="section"><h2>Integrar OpenAI</h2><p>Respuestas inteligentes.</p></div>`},
{title:"Make + Airtable",html:`<div class="section"><h2>Make + Airtable</h2><p>Automatización completa.</p></div>`}
]
},
{
title:"Módulo 3 - Flujos",
lessons:[
{title:"Diseño conversacional",html:`<div class="section"><h2>Diseño conversacional</h2><p>Principios clave.</p></div>`},
{title:"Flow Builder",html:`<div class="section"><h2>Flow Builder</h2><p>Construcción visual.</p></div>`},
{title:"Captura de leads",html:`<div class="section"><h2>Captura de leads</h2><p>Flujo fuera de horario.</p></div>`},
{title:"Cierre de ventas",html:`<div class="section"><h2>Cierre de ventas</h2><p>Calificación de leads.</p></div>`}
]
},
{
title:"Módulo 4 - Negocio",
lessons:[
{title:"Caso propio",html:`<div class="section"><h2>Tu negocio</h2><p>Validación real.</p></div>`},
{title:"Cliente beta",html:`<div class="section"><h2>Cliente beta</h2><p>Primer caso.</p></div>`},
{title:"Dashboard",html:`<div class="section"><h2>Dashboard</h2><p>Métricas clave.</p></div>`},
{title:"Escalar",html:`<div class="section"><h2>Escalar</h2><p>De 1 a 10 clientes.</p></div>`}
]
}
];

const allLessons = MODULES.flatMap(m=>m.lessons);

let current=0;
let completed=[];

function renderSidebar(){
const s=document.getElementById("sidebar");
s.innerHTML="";
MODULES.forEach(m=>{
const title=document.createElement("div");
title.className="module-title";
title.textContent=m.title;
s.appendChild(title);

m.lessons.forEach(l=>{
const index=allLessons.indexOf(l);
const b=document.createElement("button");
b.className="lesson-btn"+(index===current?" active":"");
b.textContent=l.title;
b.onclick=()=>loadLesson(index);
s.appendChild(b);
});
});
}

function loadLesson(i){
current=i;
const c=document.getElementById("content");
c.innerHTML=allLessons[i].html;

const nav=document.createElement("div");
nav.className="nav";

const prev=document.createElement("button");
prev.className="nav-btn";
prev.innerHTML="← Anterior";
prev.disabled=i===0;
prev.onclick=()=>loadLesson(i-1);

const next=document.createElement("button");
next.className="nav-btn primary";

if(i<allLessons.length-1){
next.innerHTML="Siguiente →";
next.onclick=()=>loadLesson(i+1);
}else{
next.innerHTML="🎉 Finalizar";
next.onclick=()=>finalScreen();
}

nav.appendChild(prev);
nav.appendChild(next);
c.appendChild(nav);

if(!completed.includes(i)){
completed.push(i);
updateProgress();
}

renderSidebar();
}

function updateProgress(){
const pct=(completed.length/allLessons.length)*100;
document.getElementById("progress").style.width=pct+"%";
}

function finalScreen(){
document.getElementById("content").innerHTML=`
<h2>🎉 Curso completado</h2>
<p>Ya puedes implementar y vender este sistema.</p>
<div class="card">🚀 Nivel experto desbloqueado</div>
`;
}

renderSidebar();
loadLesson(0);

</script>

</body>
</html>
:::
