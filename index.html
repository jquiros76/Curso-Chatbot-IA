<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Curso: Chatbot IA para WhatsApp Business</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* VARIABLES */
:root {
  --green: #00c853;
  --green-dark: #008f3a;
  --green-glow: rgba(0,200,83,0.25);
  --bg: #0a0f0a;
  --bg2: #0f160f;
  --bg3: #141d14;
  --card: #111811;
  --border: #1e2e1e;
  --text: #e8f0e8;
  --muted: #7a9a7a;
  --white: #ffffff;
  --accent: #b9ff66;
}

/* BASE */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HERO */
.hero {
  padding: 60px 40px;
  border-bottom: 1px solid var(--border);
}

.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: 3rem;
  font-weight: 800;
}

.hero span {
  color: var(--accent);
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 20px;
  background: var(--bg2);
}

.lesson-btn {
  display: block;
  width: 100%;
  padding: 10px;
  border: none;
  background: none;
  color: var(--muted);
  text-align: left;
  cursor: pointer;
}

.lesson-btn:hover {
  color: var(--text);
}

.lesson-btn.active {
  color: var(--green);
}

/* CONTENT */
.content {
  padding: 40px;
  max-width: 800px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

/* BOTÓN */
.complete-btn {
  margin-top: 30px;
  padding: 12px;
  border: 1px solid var(--green);
  background: transparent;
  color: var(--green);
  cursor: pointer;
}

.complete-btn:hover {
  background: var(--green-glow);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<div class="hero">
  <h1>Chatbot IA para <span>WhatsApp Business</span></h1>
</div>

<div class="layout">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="content" id
