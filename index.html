            <div class="lesson-tag">M\u00f3dulo 1 \u00b7 Lecci\u00f3n 4</div>\
            <h2 class="lesson-title">Handoff Humano: Cu\u00e1ndo y C\u00f3mo</h2>\
            <p class="lesson-desc">El chatbot no reemplaza al humano, lo potencia. Aprende a dise\u00f1ar una transici\u00f3n fluida entre bot y agente.</p>\
          </div>\
          <div class="section">\
            <div class="section-title">\u00bfQu\u00e9 es el handoff?</div>\
            <p class="body-text">Es el momento en que la conversaci\u00f3n pasa del chatbot autom\u00e1tico a un agente humano. Un buen handoff es <strong>transparente</strong> para el cliente y <strong>eficiente</strong> para el negocio.</p>\
          </div>\
          <div class="section">\
            <div class="section-title">\u00bfCu\u00e1ndo transferir al humano?</div>\
            <ul class="styled-list">\
              <li>El cliente lo solicita expl\u00edcitamente (&quot;hablar con una persona&quot;)</li>\
              <li>La IA no entiende la consulta despu\u00e9s de 2 intentos</li>\
              <li>El tema involucra dinero, quejas o decisiones complejas</li>\
              <li>El lead est\u00e1 listo para cerrar venta (hot lead)</li>\
              <li>Palabras clave de urgencia: &quot;urgente&quot;, &quot;problema&quot;, &quot;error&quot;</li>\
            </ul>\
          </div>\
          <div class="section">\
            <div class="section-title">Flujo de handoff recomendado</div>\
            <div class="flow">\
              <div class="flow-step"><div class="step-num">1</div>Bot detecta trigger</div>\
              <div class="flow-arrow">&rarr;</div>\
              <div class="flow-step"><div class="step-num">2</div>Notifica al agente</div>\
              <div class="flow-arrow">&rarr;</div>\
              <div class="flow-step"><div class="step-num">3</div>Bot informa al cliente</div>\
              <div class="flow-arrow">&rarr;</div>\

              <div class="flow-arrow">&rarr;</div>\
              <div class="flow-step"><div class="step-num">5</div>Bot retoma si el agente no responde</div>\

            <div class="highlight-label">&#9888;&#65039; Error com\u00fan</div>\
            <p>No dejar al cliente en silencio. Si el agente no est\u00e1 disponible, el bot debe decir: <em>&quot;Te estamos conectando con un asesor, en breve te contactamos.&quot;</em> Nunca dejes la conversaci\u00f3n muerta.</p>\

// =====================
// STORAGE
// =====================
const STORAGE_KEY = 'curso_chatbot_progreso';

const completed = new Set();
let currentLesson = null;

function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
}

function loadProgress(){
  const data = localStorage.getItem(STORAGE_KEY);
  if(data){
    JSON.parse(data).forEach(id => completed.add(id));
  }
}

// =====================
// DATA
// =====================
const allLessons = MODULES.flatMap(m => m.lessons);
const totalLessons = allLessons.length;
const moduleOrder = MODULES.map(m => m.id);

// =====================
// UNLOCK LOGIC
// =====================
function isModuleUnlocked(moduleId){
  const index = moduleOrder.indexOf(moduleId);
  if(index === 0) return true;

  const prevModule = MODULES[index - 1];
  return prevModule.lessons.every(l => completed.has(l.id));
}

// =====================
// PROGRESS
// =====================
function updateProgress() {
  const pct = Math.round((completed.size / totalLessons) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  if(pct === 100){
    showCertificate();
  }
}

// =====================
// SIDEBAR
// =====================
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  MODULES.forEach((mod, mi) => {
    const group = document.createElement('div');
    group.className = 'module-group';

    const btn = document.createElement('button');
    btn.className = 'module-btn';
    btn.innerHTML = `<span>${mod.title}</span><span class="module-num">0${mi+1}</span>`;
    group.appendChild(btn);

    const list = document.createElement('div');
    list.className = 'lesson-list';

    const unlocked = isModuleUnlocked(mod.id);

    mod.lessons.forEach(lesson => {
      const lb = document.createElement('button');

      lb.className = 'lesson-btn'
        + (completed.has(lesson.id) ? ' completed' : '')
        + (currentLesson === lesson.id ? ' active' : '')
        + (!unlocked ? ' locked' : '');

      lb.innerHTML = `<span class="check">${completed.has(lesson.id) ? '✓' : '○'}</span> ${lesson.title}`;

      lb.onclick = () => {
        if(unlocked){
          loadLesson(lesson.id);
        } else {
          alert('🔒 Completa el módulo anterior para desbloquear 🚀');
        }
      };

      list.appendChild(lb);
    });

    group.appendChild(list);
    nav.appendChild(group);
  });
}

// =====================
// LOAD LESSON
// =====================
function loadLesson(id) {
  const lesson = allLessons.find(l => l.id === id);
  if (!lesson) return;

  currentLesson = id;

  const content = document.getElementById('lesson-content');
  content.innerHTML = lesson.content();

  const completeBtn = document.createElement('button');
  completeBtn.className = 'complete-btn' + (completed.has(id) ? ' done' : '');
  completeBtn.textContent = completed.has(id) ? '✓ Lección completada' : 'Marcar como completada';

  completeBtn.onclick = () => {
    completed.add(id);
    saveProgress();
    completeBtn.className = 'complete-btn done';
    completeBtn.textContent = '✓ Lección completada';
    updateProgress();
    renderSidebar();
  };

  content.appendChild(completeBtn);

  const nav = document.createElement('div');
  nav.className = 'lesson-nav';

  const idx = allLessons.findIndex(l => l.id === id);
  const prev = allLessons[idx - 1];
  const next = allLessons[idx + 1];

  const prevBtn = document.createElement('button');
  prevBtn.className = 'nav-btn';
  prevBtn.innerHTML = '← Anterior';
  prevBtn.disabled = !prev;
  prevBtn.onclick = () => prev && loadLesson(prev.id);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'nav-btn primary';
  nextBtn.innerHTML = next ? 'Siguiente →' : '🎉 Finalizar curso';
  nextBtn.onclick = () => next ? loadLesson(next.id) : null;

  nav.appendChild(prevBtn);
  nav.appendChild(nextBtn);
  content.appendChild(nav);

  renderSidebar();
  updateProgress();

  window.scrollTo(0, 0);
}

// =====================
// CERTIFICADO
// =====================
function showCertificate(){
  const content = document.getElementById('lesson-content');

  content.innerHTML = `
    <div style="text-align:center; padding:40px">
      <h1 style="color:#38bdf8">🎓 Certificado de Finalización</h1>
      <p>Has completado el curso:</p>
      <h2 style="color:#22c55e">Chatbot IA para WhatsApp Business</h2>

      <p>Otorgado a:</p>
      <h2 contenteditable="true">Escribe tu nombre</h2>

      <p>Fecha: ${new Date().toLocaleDateString()}</p>

      <button onclick="window.print()">Descargar PDF</button>
    </div>
  `;
}

// =====================
// INIT
// =====================
loadProgress();
renderSidebar();
updateProgress();
loadLesson(allLessons[0].id);
