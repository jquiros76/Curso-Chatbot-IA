<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Módulo 2 - Chatbots IA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.sidebar{
  width:260px;
  height:100vh;
  background:#0f172a;
  position:fixed;
  overflow:auto;
}

.sidebar h2{
  padding:20px;
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  padding:15px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1e293b;
}

.content{
  margin-left:260px;
  padding:30px;
  max-width:900px;
}

h1{color:#38bdf8;}
h2{color:#22c55e;}

p{
  line-height:1.7;
  margin-top:10px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>Módulo 2</h2>

<button onclick="load('l1')">Lección 2.1</button>
<button onclick="load('l2')">Lección 2.2</button>
<button onclick="load('l3')">Lección 2.3</button>
<button onclick="load('l4')">Lección 2.4</button>
<button onclick="load('l5')">Lección 2.5</button>
</div>

<div class="content" id="content"></div>

<script>

const data = {

l1: `
<h1>Lección 2.1 — Crear cuenta en OpenAI y obtener API key</h1>

<p>Bienvenido al Módulo 2. Aquí empiezas a construir tu primer chatbot real.</p>

<p>Primero necesitas tu API key de OpenAI.</p>

<h2>¿Qué es una API key?</h2>

<p>Es una llave secreta que permite que tu chatbot use la inteligencia artificial.</p>

<div class="card">
Sin API key → el chatbot no puede responder
</div>

<h2>Pasos:</h2>

<p>1. Ve a platform.openai.com</p>
<p>2. Crea tu cuenta (recomendado con Google)</p>
<p>3. Verifica tu teléfono</p>
<p>4. Ve a API Keys</p>
<p>5. Crea tu clave y guárdala</p>

<div class="card">
⚠️ Solo se muestra una vez, guárdala bien
</div>

<p>Agrega $5 de crédito para empezar.</p>
`,

l2: `
<h1>Lección 2.2 — Conectar OpenAI con Make</h1>

<p>Make es la herramienta que conecta todo sin código.</p>

<div class="card">
Funciona como bloques tipo LEGO
</div>

<h2>Pasos:</h2>

<p>1. Crear cuenta en make.com</p>
<p>2. Crear nuevo escenario</p>
<p>3. Agregar módulo OpenAI</p>
<p>4. Pegar API key</p>

<p>Selecciona modelo: gpt-4o-mini</p>

<h2>Prueba</h2>

<p>Escribe: "Hola, ¿cómo estás?"</p>

<div class="card">
Si responde → ya funciona tu chatbot
</div>
`,

l3: `
<h1>Lección 2.3 — Sistema Prompt</h1>

<p>El sistema prompt es lo más importante del chatbot.</p>

<h2>Define:</h2>

<ul>
<li>Identidad</li>
<li>Tono</li>
<li>Información</li>
<li>Reglas</li>
<li>Objetivo</li>
</ul>

<h2>Ejemplo:</h2>

<div class="card">
Eres Sofia, asistente de una tienda de ropa.<br>
Eres amigable y ayudas a vender productos.
</div>

<p>Un buen prompt puede triplicar conversiones.</p>
`,

l4: `
<h1>Lección 2.4 — Pruebas y ajustes</h1>

<p>Ahora debes probar tu chatbot.</p>

<h2>Prueba:</h2>

<ul>
<li>Preguntas normales</li>
<li>Quejas</li>
<li>Compras</li>
<li>Dudas</li>
</ul>

<p>Ajusta el prompt según respuestas.</p>

<div class="card">
💡 Mejores bots = más pruebas
</div>
`,

l5: `
<h1>Lección 2.5 — Práctica completa</h1>

<p>Crearás chatbot para TechShop.</p>

<h2>Productos:</h2>

<ul>
<li>Audífonos</li>
<li>Cargadores</li>
<li>Fundas</li>
</ul>

<h2>Objetivo:</h2>

<p>Ayudar y cerrar ventas.</p>

<h2>Prueba:</h2>

<ul>
<li>Cliente indeciso</li>
<li>Cliente directo</li>
<li>Cliente listo para comprar</li>
</ul>

<div class="card">
🔥 Ya tienes tu primer chatbot funcional
</div>
`

};

function load(id){
  document.getElementById("content").innerHTML = data[id];
}

load('l1');

</script>

</body>
</html>
